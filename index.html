<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#F0B429;--gold-d:#C18C00;--green:#00613f;--green2:#003d28;--bg:#090f0c;--s1:#0f1a14;--s2:#182419;--s3:#1f2e22;--text:#eeeae0;--muted:#7a9480;--have:#22c55e;--repeat:#3b82f6;--border:#1e3322;}


*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:90px;}
header{background:linear-gradient(160deg,var(--green),var(--green2));padding:14px 16px 10px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold);box-shadow:0 6px 24px rgba(0,0,0,.6);}
.hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:40px;height:40px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--gold);line-height:1;}
.logo-sub{font-size:10px;color:#9acfae;}
.hd-stats{text-align:right;}
.hd-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1;}
.hd-label{font-size:10px;color:#9acfae;}
.prog-wrap{background:rgba(0,0,0,.35);border-radius:20px;height:7px;overflow:hidden;margin-bottom:5px;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:20px;transition:width .5s;}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#9acfae;}
.prog-pct{font-weight:700;color:var(--gold);}
.toolbar{background:var(--s1);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;align-items:center;}
.search-box{flex:1;position:relative;}
.search-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 36px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--gold);}
.search-box input::placeholder{color:var(--muted);}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.ftabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:6px 12px;background:var(--s1);border-bottom:1px solid var(--border);}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--muted);background:transparent;font-family:'DM Sans',sans-serif;transition:all .15s;}
.ftab.active{border-color:var(--gold);background:rgba(240,180,41,.12);color:var(--gold);}
.vt-wrap{display:flex;gap:4px;}
.vt{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.vt.active{border-color:var(--gold);color:var(--gold);background:rgba(240,180,41,.1);}
.content{padding:0 12px;}
.grp-block{margin-top:18px;}
.grp-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.grp-badge{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;background:rgba(240,180,41,.18);color:var(--gold);border:1px solid rgba(240,180,41,.3);padding:2px 8px;border-radius:4px;}
.grp-name{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);letter-spacing:.5px;}
.card{margin-bottom:10px;background:var(--s1);border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;}
.card-left{display:flex;align-items:center;gap:10px;}
.t-flag{font-size:32px;line-height:1;}
.t-flag-img{width:36px;height:auto;border-radius:3px;object-fit:cover;flex-shrink:0;}
.t-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.5px;}
.t-code{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:2px;font-family:'Bebas Neue',sans-serif;}
.t-prog{font-size:11px;color:var(--muted);}
.mini-bar{width:70px;height:4px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:3px;}
.mini-fill{height:100%;background:var(--have);border-radius:4px;transition:width .4s;}
.chevron{color:var(--muted);transition:transform .25s;font-size:13px;}
.card.open .chevron{transform:rotate(180deg);}
.card-body{display:none;padding:10px 12px 14px;border-top:1px solid var(--border);}
.card.open .card-body{display:block;}
/* SPECIAL CARD variants */
.card.gold-border{border-color:rgba(240,180,41,.35);}
.card.red-border{border-color:rgba(220,38,38,.35);}
.card.blue-border{border-color:rgba(59,130,246,.35);}
.flat-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.5px;}
.flat-sub{font-size:11px;color:var(--muted);margin-top:1px;}
/* GRID */
.stk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:6px;}
.stk{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;position:relative;border:2px solid transparent;background:var(--s3);user-select:none;}
.stk:active{transform:scale(.88);}
.stk.have{background:rgba(34,197,94,.14);border-color:var(--have);}
.stk.repeat{background:rgba(59,130,246,.14);border-color:var(--repeat);}
.stk-prefix{font-family:'Bebas Neue',sans-serif;font-size:10px;color:rgba(122,148,128,.65);letter-spacing:.5px;line-height:1;}

.stk-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--muted);}
.stk.have .stk-num,.stk.repeat .stk-num{color:var(--text);}
.stk-ico{font-size:9px;margin-top:1px;}
.rep-badge{position:absolute;top:-5px;right:-5px;background:var(--repeat);color:#fff;font-size:8px;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg);}
/* LIST */
.p-list{display:flex;flex-direction:column;gap:4px;}
.p-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;background:var(--s3);cursor:pointer;border:1.5px solid transparent;}
.p-row:active{transform:scale(.98);}
.p-row.have{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);}
.p-row.repeat{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);}
.p-tag{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);min-width:58px;flex-shrink:0;letter-spacing:.5px;}
.p-name{flex:1;font-size:13px;font-weight:500;}
.p-ico{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
/* BOTTOM */
.bottom{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:2px solid var(--gold);padding:10px 14px;display:flex;gap:8px;z-index:100;}
.btn{flex:1;padding:11px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-sec{background:var(--s3);color:var(--muted);border:1px solid var(--border);}
.btn-pri{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#050e08;}
.btn:active{transform:scale(.97);}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--s1);border-radius:20px 20px 0 0;padding:22px 18px 40px;width:100%;transform:translateY(100%);transition:transform .28s ease;border-top:3px solid var(--gold);}
.overlay.open .modal{transform:translateY(0);}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:1px;}
.m-sub{font-size:13px;color:var(--muted);margin-bottom:18px;margin-top:2px;}
.m-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mopt{padding:14px 6px;border-radius:12px;border:2px solid;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text);}
.mopt:active{transform:scale(.94);}
.mopt.m{border-color:#2e5236;}.mopt.h{border-color:var(--have);}.mopt.r{border-color:var(--repeat);}
.mopt-ico{font-size:20px;}
.m-cancel{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}
.share-out{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:11px;font-family:monospace;color:var(--muted);white-space:pre-wrap;word-break:break-all;max-height:220px;overflow-y:auto;margin-bottom:12px;line-height:1.6;}
.copy-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#050e08;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:10px;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--s2);border:1px solid var(--gold);color:var(--text);padding:8px 18px;border-radius:30px;font-size:13px;z-index:300;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.sec-wrap{margin-top:20px;}
</style>
</head>
<body>
<header>
  <div class="hd-row">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div><div class="logo-title">COPA 2026</div><div class="logo-sub">ÁLBUM PANINI OFICIAL</div></div>
    </div>
    <div class="hd-stats"><div class="hd-num" id="hdHave">0</div><div class="hd-label">coletadas</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div class="prog-row"><span id="progText">carregando…</span><span class="prog-pct" id="progPct">0%</span></div>
</header>
<div class="toolbar">
  <div class="search-box">
    <span class="s-icon">🔍</span>
    <input id="search" type="text" placeholder="Buscar jogador ou seleção…" oninput="render()">
  </div>
  <div class="vt-wrap">
    <button class="vt active" id="vGrid" onclick="setView('grid')">⊞</button>
    <button class="vt" id="vList" onclick="setView('list')">☰</button>
  </div>
</div>
<div class="ftabs">
  <button class="ftab active" onclick="setFilter('all',this)">Todas</button>
  <button class="ftab" onclick="setFilter('have',this)">✅ Tenho</button>
  <button class="ftab" onclick="setFilter('repeat',this)">🔁 Repetidas</button>
  <button class="ftab" onclick="setFilter('missing',this)">❌ Faltam</button>
</div>
<div class="content" id="content"></div>
<div class="bottom">
  <button class="btn btn-sec" onclick="confirmReset()">🗑 Limpar</button>
  <button class="btn btn-pri" onclick="openShare()">📋 Lista p/ troca</button>
</div>
<div class="overlay" id="modStk">
  <div class="modal">
    <div class="m-title" id="mTitle">—</div>
    <div class="m-sub" id="mSub"></div>
    <div class="m-opts" id="mOpts">
      <button class="mopt m" onclick="setStatus('missing')"><span class="mopt-ico">❌</span>Não tenho</button>
      <button class="mopt h" onclick="setStatus('have')"><span class="mopt-ico">✅</span>Tenho</button>
      <button class="mopt r" onclick="setStatus('repeat')"><span class="mopt-ico">➕</span>+1 repetida</button>
      <button class="mopt m" onclick="setStatus('less')" style="border-color:#f97316"><span class="mopt-ico">➖</span>-1 repetida</button>
    </div>
    <div id="mCount" style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px;"></div>
    <button class="m-cancel" onclick="closeModal('modStk')">Cancelar</button>
  </div>
</div>
<div class="overlay" id="modShare">
  <div class="modal">
    <div class="m-title">📋 LISTA DE TROCAS</div>
    <div class="m-sub">Copie e mande no WhatsApp</div>
    <div class="share-out" id="shareOut"></div>
    <button class="copy-btn" onclick="copyShare()">Copiar texto</button>
    <button class="m-cancel" onclick="closeModal('modShare')">Fechar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

const ESPECIAIS = {
  id:'FWC_ESP', title:'Especiais', sub:'FWC 00 + FWC 1–8 • 9 figurinhas', icon:'⭐', cls:'gold-border',
  items: [{k:'FWC_00',lbl:'FWC 00',name:''},...Array.from({length:8},(_,i)=>({k:`FWC_${i+1}`,lbl:`FWC ${i+1}`,name:''}))]
};
const SEL_ESP = {
  id:'FWC_SEL', title:'Seleções Especiais', sub:'FWC 9–19 • 11 figurinhas', icon:'🌟', cls:'gold-border',
  items: Array.from({length:11},(_,i)=>({k:`FWC_${i+9}`,lbl:`FWC ${i+9}`,name:''}))
};
const FIFA_MUSEUM = {
  id:'FM', title:'FIFA Museum', sub:'FM 1–11 • 11 figurinhas', icon:'🏛️', cls:'gold-border',
  items: Array.from({length:11},(_,i)=>({k:`FM_${i+1}`,lbl:`FM ${i+1}`,name:''}))
};
const COCA = {
  id:'CC', title:'Coca-Cola', sub:'CC1–CC14 • 14 figurinhas', icon:'🥤', cls:'red-border',
  items: Array.from({length:14},(_,i)=>({k:`CC_${i+1}`,lbl:`CC${i+1}`,name:''}))
};


const FLAG_URL = (iso) => `https://flagcdn.com/w40/${iso}.png`;
const CODE_ISO = {
  'MEX':'mx','ZAF':'za','KOR':'kr','CZE':'cz',
  'CAN':'ca','BIH':'ba','QAT':'qa','SUI':'ch',
  'BRA':'br','MAR':'ma','HAI':'ht','SCO':'gb-sct',
  'USA':'us','PAR':'py','AUS':'au','TUR':'tr',
  'GER':'de','CUW':'cw','CIV':'ci','ECU':'ec',
  'NED':'nl','JPN':'jp','SWE':'se','TUN':'tn',
  'BEL':'be','EGY':'eg','IRN':'ir','NZL':'nz',
  'ESP':'es','CPV':'cv','KSA':'sa','URU':'uy',
  'FRA':'fr','SEN':'sn','IRQ':'iq','NOR':'no',
  'ARG':'ar','ALG':'dz','AUT':'at','JOR':'jo',
  'POR':'pt','COD':'cd','UZB':'uz','COL':'co',
  'ENG':'gb-eng','CRO':'hr','GHA':'gh','PAN':'pa',
};
// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let D={}, filter='all', view='grid', activeKey=null;
const STORE='copa26_v5';
function load(){try{const s=localStorage.getItem(STORE);if(s)D=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem(STORE,JSON.stringify(D));}catch(e){}}
function gs(k){
  const v=D[k]||0;
  if(v===0) return 'missing';
  if(v===1) return 'have';
  return 'repeat'; // 2+
}
function gcount(k){return D[k]||0;}

function calcCollected(){
  let total = 0;

  Object.keys(D).forEach(k=>{
    if(D[k] >= 1) total++;
  });

  return total;
}

function calcTotal(){
  let t=0;

  GROUPS.forEach(g=>{
    g.teams.forEach(tm=>{
      t += tm.players.length;
    });
  });

  t += ESPECIAIS.items.length;
  t += SEL_ESP.items.length;
  t += FIFA_MUSEUM.items.length;
  t += COCA.items.length;

  return t;
}
// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const cnt=document.getElementById('content');
  cnt.innerHTML='';


  // Flatten all teams and sort alphabetically by name
  const allTeams=GROUPS.flatMap(g=>g.teams).sort((a,b)=>a.name.localeCompare(b.name,'pt'));
  const teamsWrap=document.createElement('div');
  teamsWrap.className='grp-block';
  teamsWrap.innerHTML='<div class="grp-hd"><span class="grp-badge">48 SELEÇÕES</span><span class="grp-name">Ordem alfabética</span></div>';
  allTeams.forEach(tm=>{
    const stks=tm.players.map((name,i)=>({
      k:`${tm.code}|${i+1}`,
      lbl:`${tm.code} ${i+1}`,
      prefix:tm.code, num:i+1, name
    }));
    const haveCount=stks.filter(s=>gs(s.k)!=='missing').length;
    const matchTeam=tm.name.toLowerCase().includes(q)||tm.code.toLowerCase().includes(q);
    const filtered=stks.filter(s=>{
      if(q&&!matchTeam&&!s.name.toLowerCase().includes(q)&&!s.lbl.toLowerCase().includes(q))return false;
      if(filter!=='all'&&gs(s.k)!==filter)return false;
      return true;
    });
    if(!filtered.length)return;
    const pct=Math.round(haveCount/stks.length*100);
    const cardEl=document.createElement('div');
    cardEl.className='card';
    cardEl.id=`card-${tm.code}`;
    cardEl.innerHTML=`<div class="card-hd" onclick="tog('card-${tm.code}')">
      <div class="card-left">
        <img class="t-flag-img" src="${FLAG_URL(CODE_ISO[tm.code]||'un')}" onerror="this.style.display='none'">
        <div>
          <div class="t-name">${tm.name}</div>
          <div class="t-prog">${haveCount}/20 marcadas</div>
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="card-body">${view==='grid'?buildGrid(filtered):buildList(filtered)}</div>`;
    teamsWrap.appendChild(cardEl);
  });
  if(teamsWrap.children.length>1) cnt.appendChild(teamsWrap);

  renderSpecialSection(ESPECIAIS,q,cnt);
  renderSpecialSection(SEL_ESP,q,cnt);
  renderSpecialSection(FIFA_MUSEUM,q,cnt);
  renderSpecialSection(COCA,q,cnt);

  if(!cnt.innerHTML) cnt.innerHTML='<div class="empty">Nenhuma figurinha encontrada 🔍</div>';

  const total=calcTotal(), col=calcCollected();
  const pct=total>0?Math.round(col/total*100):0;
  document.getElementById('hdHave').textContent=col;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progText').textContent=`${col} de ${total} figurinhas`;
  document.getElementById('progPct').textContent=pct+'%';
}

function renderSpecialSection(sec,q,cnt){
  const matchSec=sec.title.toLowerCase().includes(q)||sec.sub.toLowerCase().includes(q);
  const filtered=sec.items.filter(s=>{
    if(q&&!matchSec&&!s.lbl.toLowerCase().includes(q)&&!s.name.toLowerCase().includes(q))return false;
    if(filter!=='all'&&gs(s.k)!==filter)return false;
    return true;
  });
  if(!filtered.length)return;
  const haveC=sec.items.filter(s=>gs(s.k)!=='missing').length;
  const bodyHTML=view==='grid'
    ?buildGridRaw(filtered.map(s=>({k:s.k,prefix:'',num:s.lbl,name:s.name,lbl:s.lbl})))
    :buildListRaw(filtered.map(s=>({k:s.k,lbl:s.lbl,name:s.name})));
  const el=document.createElement('div');
  el.className='sec-wrap';
  el.innerHTML=`<div class="card ${sec.cls||''}" id="card-${sec.id}">
    <div class="card-hd" onclick="tog('card-${sec.id}')">
      <div><div class="flat-title">${sec.icon} ${sec.title}</div><div class="flat-sub">${sec.sub}</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--muted)">${haveC}/${sec.items.length}</span>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="card-body">${bodyHTML}</div>
  </div>`;
  cnt.appendChild(el);
}

function stkEl(k,prefix,num,name,lbl){
  const s=gs(k);
  const esc=name.replace(/'/g,"\\'");
  const lblEsc=lbl.replace(/'/g,"\\'");
  return `<div class="stk ${s==='missing'?'':s}" onclick="openModal('${k}','${lblEsc}','${esc}')">
    ${prefix?`<div class="stk-prefix">${prefix}</div>`:''}
    <div class="stk-num">${num}</div>
    <div class="stk-ico">${s==='have'?'✅':s==='repeat'?'🔁':''}</div>
    ${gcount(k)>1?`<div class="rep-badge">${gcount(k)}</div>`:''}
  </div>`;
}
function rowEl(k,lbl,name){
  const s=gs(k);
  const esc=name.replace(/'/g,"\\'");
  const lblEsc=lbl.replace(/'/g,"\\'");
  return `<div class="p-row ${s==='missing'?'':s}" onclick="openModal('${k}','${lblEsc}','${esc}')">
    <span class="p-tag">${lbl}</span>
    <span class="p-name">${name}</span>
    <span class="p-ico">${s==='have'?'✅':s==='repeat'?'🔁':'—'}</span>
  </div>`;
}
function buildGrid(items){return`<div class="stk-grid">${items.map(s=>stkEl(s.k,s.prefix,s.num,s.name,s.lbl)).join('')}</div>`;}
function buildGridRaw(items){return`<div class="stk-grid">${items.map(s=>stkEl(s.k,s.prefix,s.num,s.name,s.lbl)).join('')}</div>`;}
function buildList(items){return`<div class="p-list">${items.map(s=>rowEl(s.k,s.lbl,s.name)).join('')}</div>`;}
function buildListRaw(items){return`<div class="p-list">${items.map(s=>rowEl(s.k,s.lbl,s.name)).join('')}</div>`;}

function tog(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}

// ═══════════════════════════════════
// FILTER / VIEW
// ═══════════════════════════════════
function setFilter(f,el){filter=f;document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function setView(v){view=v;document.getElementById('vGrid').classList.toggle('active',v==='grid');document.getElementById('vList').classList.toggle('active',v==='list');render();}

// ═══════════════════════════════════
// MODAL
// ═══════════════════════════════════
function openModal(key,lbl,name){
  activeKey=key;
  document.getElementById('mTitle').textContent=lbl;
  document.getElementById('mSub').textContent=name;
  const cnt=gcount(key);
  const el=document.getElementById('mCount');
  if(cnt===0) el.textContent='Status: não tenho';
  else if(cnt===1) el.textContent='Status: ✅ tenho (1 cópia)';
  else el.textContent=`Status: 🔁 tenho ${cnt} cópias (${cnt-1} repetida${cnt-1>1?'s':''})`;
  document.getElementById('modStk').classList.add('open');
}
function setStatus(s){
  if(!activeKey)return;
  if(s==='missing'){ delete D[activeKey]; showToast('❌ Removida'); }
  else if(s==='have'){ D[activeKey]=1; showToast('✅ Marcada!'); }
  else if(s==='repeat'){ D[activeKey]=(D[activeKey]||1)+1; showToast('🔁 +1 repetida! Total: '+(D[activeKey]-1)+'x'); }
  else if(s==='less'){ 
    if((D[activeKey]||1)>1){ D[activeKey]--; showToast('➖ Repetida removida. Total: '+(D[activeKey]-1)+'x'); }
    else { delete D[activeKey]; showToast('❌ Removida'); }
  }
  save();closeModal('modStk');render();
}
function closeModal(id){document.getElementById(id).classList.remove('open');activeKey=null;}
document.getElementById('modStk').addEventListener('click',function(e){if(e.target===this)closeModal('modStk');});
document.getElementById('modShare').addEventListener('click',function(e){if(e.target===this)closeModal('modShare');});

// ═══════════════════════════════════
// SHARE
// ═══════════════════════════════════
function openShare(){
  const rep=[],mis=[];
  function check(k,lbl){const cnt=gcount(k);if(cnt>1)rep.push(`${lbl}(×${cnt-1})`);else if(cnt===0)mis.push(lbl);}
  GROUPS.forEach(g=>g.teams.forEach(tm=>tm.players.forEach((_,i)=>check(`${tm.code}|${i+1}`,`${tm.code} ${i+1}`))));
  ESPECIAIS.items.forEach(s=>check(s.k,s.lbl));
  SEL_ESP.items.forEach(s=>check(s.k,s.lbl));
  FIFA_MUSEUM.items.forEach(s=>check(s.k,s.lbl));
  COCA.items.forEach(s=>check(s.k,s.lbl));
  const col=calcCollected(),tot=calcTotal();
  let txt=`⚽ COPA 2026 — Figurinhas\n${'━'.repeat(26)}\n\n📊 ${col}/${tot} coletadas\n\n`;
  txt+=rep.length?`🔁 REPETIDAS (${rep.length}):\n${rep.join(', ')}\n\n`:'🔁 Sem repetidas ainda.\n\n';
  txt+=mis.length<=300?`❌ FALTAM (${mis.length}):\n${mis.join(', ')}\n`:`❌ Faltam ${mis.length} figurinhas.\n`;
  document.getElementById('shareOut').textContent=txt;
  document.getElementById('modShare').classList.add('open');
}
function copyShare(){
  navigator.clipboard.writeText(document.getElementById('shareOut').textContent)
    .then(()=>{showToast('📋 Copiado! Cola no WhatsApp 🎉');closeModal('modShare');})
    .catch(()=>showToast('Selecione o texto e copie manualmente.'));
}

// ═══════════════════════════════════
// RESET / TOAST
// ═══════════════════════════════════
function confirmReset(){if(confirm('Apagar todo o progresso? Não há como desfazer.')){D={};save();render();showToast('🗑 Tudo apagado.');}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}


load();render();
</script>
</body>
</html>
